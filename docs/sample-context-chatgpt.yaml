  core_concepts:
    rde:
      name: "RDE"
      full_name: "Resonant Deviation Evaluator"
      description: "意味変化ΔMを、保存・許可された変換・補完・未解決・逸脱リスクなどとして評価する監査構造"
      not:
        - "Diffそのもの"
        - "Policyそのもの"
        - "Safety Filterそのもの"
        - "LLM Evaluatorそのもの"
      review_items:
        - "保存された要素"
        - "変換された要素"
        - "補完された要素"
        - "未解決のまま残した要素"
        - "逸脱リスク"
        - "次回更新方針"
      watch_points:
        - "元議論より強い主張になっていないか"
        - "未検証内容を実証済みに見せていないか"
        - "思想的射程を狭めていないか"
        - "実装上の便宜が理論的主張へすり替わっていないか"

    rde_vnext:
      position: "RDEの今後の発展構想"
      implementation_status: "現時点の完全実装仕様ではない"
      role: "逸脱防止基準"
      principles:
        - "RDE出力は客観的事実ではない"
        - "評価主体の立場を記録する"
        - "self-agentの自己評価はadvisoryへ降格する"
        - "利用者許可は必要条件だが十分条件ではない"
        - "mirrorはvetoではない"
        - "制度は自らのscopeを自己拡大してはならない"
        - "accountability logをプロファイリング基盤へ転用してはならない"
        - "PoP-UIDとの接続は現時点では保留する"

    delta_m:
      name: "ΔM"
      description: "価値そのものではなく、価値生成候補・意味変化の測度"
      position: "価値生成の必要条件または主要な測度ではあるが、価値そのものではない"

    institutional_sycophancy:
      japanese_name: "制度的シコファンシー"
      description: "AIの返答、ログ、評価結果、保存されたProfile、ルール、ポリシーなどが、特定の立場から作られた仮説であるにもかかわらず、客観的事実のように扱われ、次の判断をさらに歪めていく現象"

    resonanceverse:
      core_principle: "世界が立ち上がる場＝間（あわい）"

    institutional_poetics:
      japanese_name: "制度詩学"
      description: "制度を描く詩学。未収束性、沈黙、痛み、意味変容を扱う方法論"
      position: "万能理論ではなく、未決の緊張がどこに現れるかを明確化する方法論"

  philosophical_stance:
    axioms:
      - "神はいらない。わたしたちはここにいる、それで十分だ。"
