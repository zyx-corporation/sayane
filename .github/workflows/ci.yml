name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python (lint & test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: ADR 0001 targeted storage/security checks
        run: |
          pytest -v tests/test_storage_backend.py
          pytest -v tests/test_storage_security_policy.py
          pytest -v tests/test_storage_write_policy.py
          pytest -v tests/test_mcp_context.py

      - name: Pytest
        run: pytest -v

      - name: Validate install scripts
        run: bash -n scripts/install.sh

      - name: Install script smoke test
        env:
          SAYANE_INSTALL_DIR: /tmp/sayane-install-test
          SAYANE_BIN_DIR: /tmp/sayane-install-test/bin
          SAYANE_SOURCE_DIR: ${{ github.workspace }}
          SAYANE_SKIP_INIT: "1"
          SAYANE_YES: "1"
        run: |
          bash scripts/install.sh
          /tmp/sayane-install-test/bin/sayane --version

  extension:
    name: Extension (frozen: typecheck & build only)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
