name: Publish PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v1.0.3)"
        required: true
        default: "v1.0.3"

permissions:
  contents: read

jobs:
  publish:
    name: Upload to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/sayane/
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check dist
        run: twine check dist/*

      - name: Verify PyPI credentials configured
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$PYPI_API_TOKEN" ]; then
            echo "Using PYPI_API_TOKEN from the pypi environment."
          else
            echo "No PYPI_API_TOKEN — attempting PyPI Trusted Publishing (OIDC)."
            echo "Configure at: https://pypi.org/manage/project/sayane/settings/publishing/"
            echo "  Owner: zyx-corporation  Repo: sayane  Workflow: publish-pypi.yml"
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
