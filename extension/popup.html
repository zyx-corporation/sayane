<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Omomuki</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 12px;
        min-width: 280px;
      }
      h1 {
        font-size: 1rem;
        margin: 0 0 8px;
      }
      label {
        font-size: 0.85rem;
        display: block;
        margin-bottom: 4px;
      }
      select,
      button {
        width: 100%;
        margin-bottom: 8px;
        box-sizing: border-box;
      }
      button {
        padding: 8px;
        cursor: pointer;
      }
      .status {
        font-size: 0.8rem;
        color: #333;
        min-height: 2.5em;
      }
      .status.error {
        color: #b00020;
      }
      .section {
        margin-top: 12px;
        border-top: 1px solid #ddd;
        padding-top: 8px;
      }
      .row {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
      }
      .row select,
      .row button {
        flex: 1;
        margin-bottom: 0;
      }
      pre.diff {
        font-size: 0.7rem;
        max-height: 120px;
        overflow: auto;
        background: #f5f5f5;
        padding: 6px;
        margin: 0 0 8px;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <h1 data-i18n="app.title">Omomuki</h1>
    <p id="status" class="status" data-i18n="status.loading">Loading…</p>

    <label for="profile-select" data-i18n="profile.label">Profile</label>
    <select id="profile-select"></select>

    <div class="section">
      <button type="button" id="btn-capture-selection" data-i18n="capture.selection">Capture selection</button>
      <button type="button" id="btn-capture-page" data-i18n="capture.page">Capture this page</button>
    </div>

    <div class="section">
      <button type="button" id="btn-insert-chatgpt" data-i18n="insert.chatgpt">Insert context (ChatGPT)</button>
      <button type="button" id="btn-insert-claude" data-i18n="insert.claude">Insert context (Claude)</button>
    </div>

    <div class="section">
      <label for="candidate-select" data-i18n="candidate.label">Candidate</label>
      <select id="candidate-select"></select>
      <div class="row">
        <select id="eval-level" data-i18n-title="candidate.evaluate">
          <option value="1" data-i18n="candidate.level1">Level 1</option>
          <option value="2" data-i18n="candidate.level2">Level 2</option>
        </select>
        <button type="button" id="btn-refresh-candidates" data-i18n="candidate.refresh">Refresh</button>
      </div>
      <button type="button" id="btn-evaluate" data-i18n="candidate.evaluate">Evaluate</button>
      <button type="button" id="btn-diff" data-i18n="candidate.diff">Show diff</button>
      <pre id="diff-preview" class="diff" hidden></pre>
      <div class="row">
        <button type="button" id="btn-approve" data-i18n="candidate.approve">Approve</button>
        <button type="button" id="btn-reject" data-i18n="candidate.reject">Reject</button>
      </div>
    </div>

    <button type="button" id="btn-options" data-i18n="options.button">Options / Pairing</button>

    <script type="module" src="dist/popup.js"></script>
  </body>
</html>
