<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title data-i18n="diff.title">Diff Viewer</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        font-size: 14px;
        line-height: 1.6;
        margin: 0;
        padding: 16px;
      }
      h1 {
        margin: 0 0 8px;
      }
      .status {
        min-height: 1.5em;
        margin-bottom: 8px;
      }
      .status.error {
        color: #b00020;
      }
      .warn {
        background: #fff8e1;
        border: 1px solid #f0c36d;
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 12px;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 13px;
        line-height: 1.5;
        background: #f5f5f5;
        padding: 10px;
        border-radius: 6px;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      .toolbar button,
      .toolbar select {
        padding: 8px;
      }
      section {
        margin-bottom: 12px;
      }
      body.is-busy,
      body.is-busy #app-root {
        cursor: wait;
      }
      button:disabled[data-cursor-hint="busy"] {
        cursor: wait !important;
      }
      button:disabled[data-cursor-hint="unavailable"] {
        cursor: not-allowed !important;
      }
      button:disabled:not([data-cursor-hint]) {
        cursor: not-allowed !important;
      }
      .content-loading {
        color: #555;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div id="app-root" aria-busy="false">
    <h1 id="title" data-i18n="diff.title">Diff Viewer</h1>
    <div id="status" class="status"></div>
    <div id="warning" class="warn" hidden></div>
    <div class="toolbar">
      <select id="eval-level">
        <option value="1">Re-evaluation Level 1</option>
        <option value="2">Re-evaluation Level 2</option>
        <option value="3">Re-evaluation Level 3</option>
      </select>
      <button type="button" id="btn-evaluate" data-i18n="candidate.evaluate">Evaluate</button>
      <button type="button" id="btn-approve" data-i18n="candidate.approve">Approve</button>
      <button type="button" id="btn-reject" data-i18n="candidate.reject">Reject</button>
      <button type="button" id="btn-close" data-i18n="diff.close">Close</button>
    </div>
    <section>
      <h2 id="heading-meta" data-i18n="diff.section.meta">Candidate Metadata</h2>
      <pre id="meta"></pre>
    </section>
    <section>
      <h2 id="heading-source" data-i18n="diff.section.source">Source Context</h2>
      <pre id="content-source"></pre>
      <details id="raw-capture-details" hidden>
        <summary id="heading-raw" data-i18n="diff.section.raw">Full Raw Capture</summary>
        <pre id="content-raw"></pre>
      </details>
    </section>
    <section>
      <h2 id="heading-proposal" data-i18n="diff.section.proposal">Candidate Context</h2>
      <pre id="content-proposal"></pre>
    </section>
    <section>
      <h2 id="heading-diff" data-i18n="diff.section.diff">Diff</h2>
      <pre id="content-diff"></pre>
    </section>
    <section>
      <h2 id="heading-rde" data-i18n="diff.section.rde">RDE Evaluation</h2>
      <pre id="content-rde"></pre>
    </section>
    <section>
      <h2 id="heading-notes" data-i18n="diff.section.notes">Notes</h2>
      <pre id="content-notes"></pre>
    </section>
    </div>
    <script type="module" src="dist/diff.js"></script>
  </body>
</html>
