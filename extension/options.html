<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sayane Settings</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 480px;
        margin: 24px;
      }
      label {
        display: block;
        margin-top: 12px;
        font-weight: 600;
      }
      input,
      select {
        width: 100%;
        box-sizing: border-box;
        margin-top: 4px;
        padding: 8px;
      }
      button {
        margin-top: 16px;
        margin-right: 8px;
        padding: 8px 16px;
      }
      .hint {
        font-size: 0.85rem;
        color: #555;
      }
      .build-info-panel {
        margin: 12px 0 16px;
        padding: 10px 12px;
        background: #f5f7fa;
        border: 1px solid #e2e6ee;
        border-radius: 6px;
      }
      .build-info-line {
        margin: 4px 0;
      }
      #status.error {
        color: #b00020;
      }
      body.is-busy,
      body.is-busy #app-root {
        cursor: wait;
      }
      button:disabled[data-cursor-hint="busy"] {
        cursor: wait !important;
      }
      button:disabled[data-cursor-hint="unavailable"] {
        cursor: not-allowed !important;
      }
      button:disabled:not([data-cursor-hint]) {
        cursor: not-allowed !important;
      }
    </style>
  </head>
  <body>
    <div id="app-root" aria-busy="false">
    <h1 data-i18n="options.title">Sayane Settings</h1>
    <section class="build-info-panel" aria-label="Build information">
      <p id="extension-build-info" class="hint build-info-line"></p>
      <p id="bridge-build-info" class="hint build-info-line"></p>
    </section>
    <p class="hint" data-i18n="options.hint">
      Run sayane serve locally. Copy the bearer token from ~/.sayane/bridge.token.
    </p>

    <label for="display-language" data-i18n="options.language">Display language</label>
    <select id="display-language">
      <option value="auto" data-i18n="options.lang.auto">Auto (browser)</option>
      <option value="en" data-i18n="options.lang.en">English</option>
      <option value="ja" data-i18n="options.lang.ja">Japanese</option>
    </select>

    <label for="bridge-url" data-i18n="options.bridge_url">Bridge URL</label>
    <input id="bridge-url" type="url" placeholder="http://127.0.0.1:38741" />

    <label for="bridge-token" data-i18n="options.bearer_token">Bearer token</label>
    <input id="bridge-token" type="password" autocomplete="off" />

    <label for="default-profile" data-i18n="options.default_profile">Default profile id</label>
    <input id="default-profile" type="text" placeholder="default" />

    <label>
      <input id="developer-mode" type="checkbox" />
      <span data-i18n="options.developer_mode">Developer mode (show page capture)</span>
    </label>
    <p class="hint" data-i18n="options.developer_mode_hint">
      When enabled, low-confidence page capture appears in the popup for debugging.
    </p>

    <label>
      <input id="show-debug-ui" type="checkbox" />
      <span data-i18n="options.show_debug_ui">Show debug UI</span>
    </label>
    <p class="hint" data-i18n="options.show_debug_ui_hint">
      When enabled, shows popup bridge check, page recheck, diagnostics panel, and the side panel Debug filter.
    </p>

    <button type="button" id="save" data-i18n="options.save">Save</button>
    <button type="button" id="test-bridge" data-i18n="options.test">Test connection</button>
    <p id="status"></p>

    </div>
    <script type="module" src="dist/options.js"></script>
  </body>
</html>
